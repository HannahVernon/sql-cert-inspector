name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: |
        Describe the problem you're trying to solve or the workflow you want to improve.
        Focus on the problem, not a specific solution — there may be a better approach.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: If you have a specific idea, describe it here.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about and why they're less ideal.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to related issues, SQL Server version constraints, etc.
