name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `sql-cert-inspector --server ...`
        2. Observe the output
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: |
        Paste the full output from the tool. Use `--json` if it helps.
        Redact any server names, IPs, or certificate details you don't want public.
      render: text

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11 23H2, Windows Server 2022"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version (if building from source)
      description: Output of `dotnet --version`
      placeholder: "e.g. 9.0.308"

  - type: input
    id: sql-version
    attributes:
      label: SQL Server version
      placeholder: "e.g. SQL Server 2022 CU16, SQL Server 2019 CU28"

  - type: input
    id: app-version
    attributes:
      label: sql-cert-inspector version
      description: Output of `sql-cert-inspector --version`
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
